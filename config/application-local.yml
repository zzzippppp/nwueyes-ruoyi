ruoyi:
  profile: D:/code/nwueyes/uploadPath

ezviz:
  appKey: ${EZVIZ_APP_KEY:your-ezviz-app-key}
  appSecret: ${EZVIZ_APP_SECRET:your-ezviz-app-secret}

presence:
  ingest:
    enabled: true
    apiKey: change-me-ingest-key
    defaultCameraId: 1
    workspaceRoot: D:/code/nwueyes-ruoyi
    replayProfileRoot: D:/code/nwueyes/uploadPath
    replayIngestBaseUrl: http://localhost:8080
    storageRoot: D:/code/nwueyes
    replayPythonCommand: python
    replayLineY: 658
    replayRoi: 640,35,1250,680
    snapshotWindowSec: 2.5
    faceMatchThreshold: 0.45
    bodyMatchThreshold: 0.50
    liveScriptPath: scripts/live_stream_worker_yolo.py
    clip:
      enabled: false
      preRollSec: 3
      postRollSec: 3
      trackLostSec: 2
      sceneMergeGapSec: 5
    analysis:
      enabled: false
      autoRun: false
      timeoutSec: 60
      prompt: 请分析这段监控视频中的人物外观、行为、多人互动和潜在风险，返回JSON字段summary、appearance、behavior、riskLevel。
      models: []
    live:
      targetDetectFps: 15
      yoloImgsz: 1280
      yoloConf: 0.20
      enterInferMargin: 80
      exitInferMargin: 80
      eventCooldownSec: 2
      enterFaceHuntMaxSec: 10
      enterFaceGraceSec: 1.5
      ezvizCloudProtocol: 4
      ezvizCloudQuality: 1
      lanRtspUrl: ${EZVIZ_LAN_RTSP_URL:}
