# 项目相关配置
ruoyi:
  # 名称
  name: RuoYi
  # 版本
  version: 3.9.2
  # 版权年份
  copyrightYear: 2026
  # 文件路径 示例（ Windows配置D:/ruoyi/uploadPath，Linux配置 /home/ruoyi/uploadPath）
  profile: ${NWUEYES_UPLOAD_PATH:D:/ruoyi/uploadPath}
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 8080
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.ruoyi: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  config:
    import: optional:classpath:application-local.yml
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 30MB
      # 设置总上传的文件大小
      max-request-size: 30MB
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true
  data:
    # redis 配置
    redis:
      # 地址
      host: localhost
      # 端口，默认为6379
      port: 6379
      # 数据库索引
      database: 0
      # 密码
      password:
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: ${TOKEN_SECRET:abcdefghijklmnopqrstuvwxyz}
  # 令牌有效期（默认30分钟）
  expireTime: 30

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.ruoyi.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 加载全局的配置文件
  configLocation: classpath:mybatis/mybatis-config.xml

# PageHelper分页插件
pagehelper:
  helperDialect: postgresql
  supportMethodsArguments: true
  params: count=countSql

# Springdoc配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
  group-configs:
    - group: 'default'
      display-name: '测试模块'
      paths-to-match: '/**'
      packages-to-scan: com.ruoyi.web.controller.tool

# 防盗链配置
referer:
  # 防盗链开关
  enabled: false
  # 允许的域名列表
  allowed-domains: localhost,127.0.0.1,ruoyi.vip,www.ruoyi.vip

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# 萤石开放平台配置
ezviz:
  baseUrl: https://open.ys7.com
  appKey: ${EZVIZ_APP_KEY:}
  appSecret: ${EZVIZ_APP_SECRET:}
  defaultChannelNo: ${EZVIZ_DEFAULT_CHANNEL_NO:1}

# 识别事件接入配置
presence:
  ingest:
    enabled: ${PRESENCE_INGEST_ENABLED:false}
    apiKey: ${PRESENCE_INGEST_API_KEY:}
    defaultLocationId: ${PRESENCE_INGEST_DEFAULT_LOCATION_ID:1}
    workspaceRoot: ${PRESENCE_REPLAY_WORKSPACE_ROOT:E:/nwueyes/ruoyi}
    replayPythonCommand: ${PRESENCE_REPLAY_PYTHON:python}
    replayScriptPath: ${PRESENCE_REPLAY_SCRIPT:scripts/video_replay_worker_yolo.py}
    analyzeScriptPath: ${PRESENCE_ANALYZE_SCRIPT:scripts/video_analyze_yolo.py}
    captureScriptPath: ${PRESENCE_CAPTURE_SCRIPT:scripts/capture_best_snapshots.py}
    storageRoot: ${PRESENCE_STORAGE_ROOT:E:/nwueyes}
    snapshotWindowSec: ${PRESENCE_SNAPSHOT_WINDOW_SEC:5}
    embedScriptPath: ${PRESENCE_EMBED_SCRIPT:scripts/embed_features.py}
    faceEmbedModel: ${PRESENCE_FACE_EMBED_MODEL:buffalo_l}
    bodyEmbedModel: ${PRESENCE_BODY_EMBED_MODEL:osnet_x0_25}
    faceMinDetScore: ${PRESENCE_FACE_MIN_DET_SCORE:0.45}
    replayProfileRoot: ${PRESENCE_REPLAY_PROFILE_ROOT:D:/ruoyi/uploadPath}
    replayIngestBaseUrl: ${PRESENCE_REPLAY_INGEST_BASE_URL:http://localhost:8080}
    replayLineY: ${PRESENCE_REPLAY_LINE_Y:520}
    replayRoi: ${PRESENCE_REPLAY_ROI:620,170,1290,760}
    faceMatchThreshold: ${PRESENCE_FACE_MATCH_THRESHOLD:0.45}
    bodyMatchThreshold: ${PRESENCE_BODY_MATCH_THRESHOLD:0.50}
    liveScriptPath: ${PRESENCE_LIVE_SCRIPT:scripts/live_stream_worker_yolo.py}
    clip:
      enabled: ${PRESENCE_CLIP_ENABLED:true}
      preRollSec: ${PRESENCE_CLIP_PRE_ROLL_SEC:3}
      postRollSec: ${PRESENCE_CLIP_POST_ROLL_SEC:3}
      trackLostSec: ${PRESENCE_CLIP_TRACK_LOST_SEC:2}
      sceneMergeGapSec: ${PRESENCE_CLIP_SCENE_MERGE_GAP_SEC:5}
      localRecordingEnabled: ${PRESENCE_CLIP_LOCAL_RECORDING_ENABLED:false}
      ezvizRecordingFormat: ${PRESENCE_CLIP_EZVIZ_RECORDING_FORMAT:MP4}
      ezvizAddressExpireSeconds: ${PRESENCE_CLIP_EZVIZ_ADDRESS_EXPIRE_SECONDS:1800}
      ezvizTranscodeBusType: ${PRESENCE_CLIP_EZVIZ_TRANSCODE_BUS_TYPE:7}
      ezvizTranscodePollIntervalMs: ${PRESENCE_CLIP_EZVIZ_TRANSCODE_POLL_INTERVAL_MS:3000}
      ezvizTranscodePollMaxAttempts: ${PRESENCE_CLIP_EZVIZ_TRANSCODE_POLL_MAX_ATTEMPTS:20}
      ezvizSpaceId: ${PRESENCE_CLIP_EZVIZ_SPACE_ID:}
      ezvizResultSpaceId: ${PRESENCE_CLIP_EZVIZ_RESULT_SPACE_ID:}
    analysis:
      enabled: ${PRESENCE_AI_ANALYSIS_ENABLED:false}
      autoRun: ${PRESENCE_AI_ANALYSIS_AUTO_RUN:false}
      timeoutSec: ${PRESENCE_AI_ANALYSIS_TIMEOUT_SEC:60}
      prompt: ${PRESENCE_AI_ANALYSIS_PROMPT:请分析这段监控视频中的人物外观、行为、多人互动和潜在风险，返回JSON字段summary、appearance、behavior、riskLevel。}
      oss:
        enabled: ${PRESENCE_AI_OSS_ENABLED:false}
        endpoint: ${PRESENCE_AI_OSS_ENDPOINT:}
        bucket: ${PRESENCE_AI_OSS_BUCKET:}
        accessKeyId: ${PRESENCE_AI_OSS_ACCESS_KEY_ID:}
        accessKeySecret: ${PRESENCE_AI_OSS_ACCESS_KEY_SECRET:}
        publicBaseUrl: ${PRESENCE_AI_OSS_PUBLIC_BASE_URL:}
        objectPrefix: ${PRESENCE_AI_OSS_OBJECT_PREFIX:safetyguard/clips}
      models: []
    live:
      targetDetectFps: ${PRESENCE_LIVE_TARGET_FPS:10}
      yoloImgsz: ${PRESENCE_LIVE_YOLO_IMGSZ:960}
      yoloConf: ${PRESENCE_LIVE_YOLO_CONF:0.20}
      enterFaceHuntMaxSec: ${PRESENCE_ENTER_FACE_HUNT_MAX_SEC:10}
      enterFaceGraceSec: ${PRESENCE_ENTER_FACE_GRACE_SEC:1.5}
