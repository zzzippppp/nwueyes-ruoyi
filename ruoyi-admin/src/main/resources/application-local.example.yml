# 本地/服务器私密配置模板
# 用法: 复制为 application-local.yml 后填写真实值（该文件已被 gitignore，不会提交）
#
#   cp application-local.example.yml application-local.yml   # Linux/macOS
#   copy application-local.example.yml application-local.yml # Windows

ruoyi:
  profile: ${NWUEYES_UPLOAD_PATH:./data/uploadPath}

ezviz:
  appKey: ${EZVIZ_APP_KEY:your-ezviz-app-key}
  appSecret: ${EZVIZ_APP_SECRET:your-ezviz-app-secret}

presence:
  ingest:
    enabled: true
    apiKey: ${PRESENCE_INGEST_API_KEY:change-me-ingest-key}
    defaultCameraId: 1
    workspaceRoot: ${PRESENCE_WORKSPACE_ROOT:./ruoyi}
    replayProfileRoot: ${NWUEYES_UPLOAD_PATH:./data/uploadPath}
    replayIngestBaseUrl: ${PRESENCE_INGEST_BASE_URL:http://localhost:8080}
    storageRoot: ${PRESENCE_STORAGE_ROOT:./data}
    replayPythonCommand: ${PRESENCE_PYTHON:python}
    # 门区标定（1920x1080 参考分辨率，其他分辨率会自动缩放）
    replayLineY: 658
    replayRoi: 640,35,1250,680
    snapshotWindowSec: 2.5
    faceMatchThreshold: 0.45
    bodyMatchThreshold: 0.50
    liveScriptPath: scripts/live_stream_worker_yolo.py
    clip:
      # 直播识别建议关闭：主码流环形缓冲占内存过大，易触发 exitCode=1
      enabled: false
      preRollSec: 3
      postRollSec: 3
      trackLostSec: 2
      sceneMergeGapSec: 5
    analysis:
      enabled: false
      autoRun: false
      timeoutSec: 60
      prompt: 请分析这段监控视频中的人物外观、行为、多人互动和潜在风险，返回JSON字段summary、appearance、behavior、riskLevel。
      models:
        # - enabled: true
        #   modelKey: qwen-vl
        #   modelName: qwen-vl-max
        #   baseUrl: https://example.com/v1/chat/completions
        #   apiKey: ${VISION_MODEL_API_KEY:}
    live:
      targetDetectFps: 15
      yoloImgsz: 1280
      yoloConf: 0.20
      enterInferMargin: 80
      exitInferMargin: 80
      eventCooldownSec: 2
      enterFaceHuntMaxSec: 10
      enterFaceGraceSec: 1.5
      ezvizCloudProtocol: 4
      ezvizCloudQuality: 1
      # 局域网 RTSP（识别/预览唯一拉流方式；ip/验证码从 camera 表读取）
      lanRtspUsername: admin
      lanRtspPort: 554
      lanRtspStreamPath: /h264/ch1/main/av_stream
      # go2rtc：统一拉摄像头 RTSP，再分发给浏览器与 Python。启动见 tools/go2rtc/start-go2rtc.ps1
      go2rtcBaseUrl: ${GO2RTC_BASE_URL:http://127.0.0.1:1984}
      go2rtcPublicBaseUrl: ${GO2RTC_PUBLIC_BASE_URL:http://127.0.0.1:1984}
      go2rtcRtspBaseUrl: ${GO2RTC_RTSP_BASE_URL:rtsp://127.0.0.1:8554}
